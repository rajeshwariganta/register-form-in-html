<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
</head>
<body>
    <form style="background-color: #ead1ab; padding: 20px; ;">
        <h3 style="color:rgb(125, 7, 35)">Student Registration Form</h3>
        <label for="name">Name  :</label>
        <input type="text" id="name" placeholder="enter the name"/><br>
        <label for="email">Email:</label>
        <input type="email" id="email"   placeholder="enter the email" autofocus />  <br>
        <label for="number">Number:</label>
        <input type="number" id="number" placeholder="enter the number"/><br>
        <label for="password">Password:</label>
        <input type="password" id="password" placeholder="enter the password"/><br>
        <label type="date" for="dob">Date of Birth:</label>
        <input type="date" id="dob" name="dob"><br>
        <label for="gender">Gender:</label><br>
        <label for="Male">Male:</label>
        <input type="radio" id="male" name="gender" value="male">
        <label for="female">Female:</label>
        <input type="radio" id="female" name="gender" value="female">
        <label for="other">Other:</label>
        <input type="radio" id="other" name="gender" value="other"><br>
        <label for="address">Address:</label>
        <textarea id="address" name="address" rows="4" cols="50" placeholder="enter the address"></textarea>
        <br><br>
        <input type="submit" value="submit"/>
       

    </form>
</body>
</html>
